<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ANM - Gestion de trabajo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030712;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,select,textarea,button{font-family:inherit}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* HEADER */
.header{background:#0a0f1e;border-bottom:1px solid #1e293b;padding:0 16px;display:flex;align-items:center;justify-content:space-between;min-height:56px;position:sticky;top:0;z-index:50;gap:8px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:10px;min-width:0}
.brand-title{color:#f8fafc;font-size:18px;font-weight:900;line-height:1.15;letter-spacing:0}
.header-subtitle{color:#64748b;font-size:13px;font-weight:500;white-space:nowrap}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tab-btn{padding:5px 10px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#475569;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:#1e293b;color:#f1f5f9}
.primary-btn{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:#3b82f6;color:#fff;white-space:nowrap}

/* CONTENT */
.content{padding:16px 16px 80px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.stat-card{background:#0f172a;border-radius:10px;padding:12px 14px}
.stat-num{font-size:20px;font-weight:900}
.stat-label{font-size:10px;color:#475569;font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}

/* ALERTS */
.alert-box{background:#1a0a0a;border:1px solid #7f1d1d55;border-radius:12px;padding:14px;margin-bottom:12px}
.alert-title{margin:0 0 10px;color:#fca5a5;font-size:13px;font-weight:800}
.alert-row{display:grid;grid-template-columns:minmax(92px,auto) minmax(0,1fr) auto auto;align-items:center;gap:8px;padding:8px 10px;background:#1e0a0a;border:1px solid #7f1d1d22;border-radius:8px;margin-bottom:6px;min-width:0}
.alert-row:last-child{margin-bottom:0}
.alert-label{font-size:11px;font-weight:800;white-space:nowrap}
.alert-main{min-width:0}
.alert-task{display:block;color:#f1f5f9;font-size:13px;font-weight:700;line-height:1.25;overflow-wrap:anywhere}
.alert-brand{display:block;color:#64748b;font-size:11px;margin-top:2px;overflow-wrap:anywhere}
.alert-date{color:#475569;font-size:12px;font-weight:600;white-space:nowrap}
.alert-owners{display:flex;align-items:center;justify-content:flex-end;min-width:26px;padding-left:4px}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-pill{display:flex;align-items:center;gap:4px}
.filter-pill label{color:#475569;font-size:11px;white-space:nowrap}
.filter-pill select{padding:5px 8px;font-size:12px}

/* TABLE (desktop) */
.table-wrap{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;overflow:visible}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;color:#475569;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;text-align:left;border-bottom:1px solid #1e293b;background:#0f172a;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr{transition:background .12s}
tr:hover td{background:#1e293b22}

/* CARD VIEW (mobile) */
.task-cards{display:none;flex-direction:column;gap:10px}
.task-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:14px}
.task-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.task-card-title{font-size:14px;font-weight:700;color:#f1f5f9;flex:1}
.task-card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#64748b}
.task-card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #1e293b22}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;white-space:nowrap;position:relative}
.badge .arrow{font-size:9px;opacity:.6;margin-left:2px}
.badge-menu{position:fixed;z-index:99999;background:#1e293b;border:1px solid #334155;border-radius:10px;overflow:hidden;min-width:150px;box-shadow:0 8px 32px #000a;display:none;max-height:220px;overflow-y:auto}
.badge-menu.open{display:block}
.badge-opt{padding:9px 14px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;border:2px solid #0f172a;flex-shrink:0}
.due-pill{font-size:12px;font-weight:700;white-space:nowrap}
.action-btns{display:flex;gap:4px;justify-content:flex-end;opacity:0;transition:opacity .15s}
tr:hover .action-btns{opacity:1}
.action-btn{background:#1e293b;border:1px solid #334155;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px}

/* MODAL */
.overlay{position:fixed;inset:0;background:#000b;z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:#0f172a;border:1px solid #1e293b;border-radius:16px;width:100%;max-width:620px;padding:24px;box-shadow:0 24px 80px #0008;margin:auto}
.modal h2{margin:0 0 20px;color:#f1f5f9;font-size:18px;font-weight:800}
.form-grid{display:grid;gap:14px}
.form-row{display:grid;gap:10px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.inp{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:8px 12px;font-size:13px;width:100%;outline:none}
.inp:focus{border-color:#3b82f6}
textarea.inp{resize:vertical;height:70px}
.owner-btns{display:flex;gap:8px;flex-wrap:wrap}
.owner-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.modal-footer{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#1e293b;color:#94a3b8}
.btn-save{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#3b82f6;color:#fff}

/* PARTNERS */
.partners-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.panel{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px}
.panel h3{color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:0 0 14px}
.person-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-wrap{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:3px}
.brand-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1e293b55}
.brand-count{font-size:12px;font-weight:700;color:#3b82f6;background:#1e3a5f;padding:2px 10px;border-radius:20px}
.partner-tasks-box{background:#0a0c14;border:1px solid #f9731622;border-radius:16px;overflow:hidden}
.partner-tasks-header{padding:14px 18px;border-bottom:1px solid #f9731622;display:flex;align-items:center;justify-content:space-between;background:#0f1218;flex-wrap:wrap;gap:8px}
.pt-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #1e293b44;transition:background .12s;flex-wrap:wrap}
.pt-row:last-child{border-bottom:none}
.pt-row:hover{background:#0f1520}
.pt-row:hover .pt-actions{opacity:1}
.pt-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.pt-title{color:#f1f5f9;font-weight:600;font-size:13px}
.pt-title.done{color:#475569;text-decoration:line-through}
.pt-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}

/* UNLOCK MODAL */
.unlock-modal{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:32px;width:min(360px,100%);text-align:center;box-shadow:0 24px 80px #000a}
.unlock-modal .icon{font-size:36px;margin-bottom:10px}
.unlock-modal h3{color:#f1f5f9;margin:0 0 6px;font-weight:800}
.unlock-modal p{color:#475569;font-size:13px;margin:0 0 18px}
.err-msg{color:#ef4444;font-size:12px;margin:0 0 10px}
select.inp{cursor:pointer}
.hidden{display:none}

/* MOBILE RESPONSIVE */
@media(max-width:640px){
  .header{padding:8px 12px;min-height:52px}
  .header-subtitle{display:none}
  .tab-btn{padding:5px 8px;font-size:11px}
  .content{padding:12px 12px 80px}
  .brand-title{font-size:17px}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-card{padding:10px 10px}
  .stat-num{font-size:18px}
  .stat-label{font-size:9px}
  /* Hide table, show cards */
  .table-wrap table{display:none}
  .task-cards{display:flex}
  .alert-box{padding:12px}
  .alert-row{grid-template-columns:minmax(0,1fr) auto;align-items:start;gap:5px 8px;padding:9px}
  .alert-label{grid-column:1/-1}
  .alert-main{grid-column:1}
  .alert-date{grid-column:1;white-space:normal}
  .alert-owners{grid-column:2;grid-row:2/4;align-self:center}
  /* Filters stack */
  .filters{flex-direction:column;align-items:flex-start;gap:6px}
  .filter-pill{width:100%}
  .filter-pill select,.filter-pill .inp{flex:1;width:100%}
  /* Partners */
  .partners-stats{grid-template-columns:1fr 1fr}
  .two-col{grid-template-columns:1fr}
  /* Modal */
  .form-row-2{grid-template-columns:1fr}
  .form-row-4{grid-template-columns:1fr 1fr}
  .modal{padding:18px}
  /* Action btns always visible on mobile */
  .action-btns{opacity:1}
  .pt-actions{opacity:1}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">
  <div class="header-left"><span class="brand-title">Gestion de trabajo ANM</span></div>
  <div class="header-right">
    <button class="tab-btn active" id="btn-tasks" onclick="setTab('tasks')">Tareas</button>
    <button class="tab-btn" id="btn-archive" onclick="setTab('archive')">Archivo</button>
    <button class="tab-btn" id="btn-partners" onclick="openPartners()">Socios</button>
    <button class="primary-btn" onclick="openNewTask()">+ Nueva tarea</button>
  </div>
</div>

<div class="content" id="content"></div>

<!-- TASK MODAL -->
<div class="overlay hidden" id="task-modal" onclick="closeModalOnBg(event,'task-modal')">
  <div class="modal">
    <h2 id="modal-title">Nueva tarea</h2>
    <div class="form-grid">
      <div class="form-row form-row-2">
        <div class="form-group"><label>Marca</label><select class="inp" id="f-brand"></select></div>
        <div class="form-group"><label>Tema</label><input class="inp" id="f-theme" placeholder="Ej: Calendario Mayo"/></div>
      </div>
      <div class="form-group"><label>Comentarios</label><textarea class="inp" id="f-comments" placeholder="Descripcion, notas..."></textarea></div>
      <div class="form-group"><label>Responsables</label><div class="owner-btns" id="f-owners"></div></div>
      <div class="form-row form-row-4">
        <div class="form-group"><label>Inicio</label><input type="date" class="inp" id="f-start"/></div>
        <div class="form-group"><label>Entrega est.</label><input type="date" class="inp" id="f-due"/></div>
        <div class="form-group"><label>Entrega real</label><input type="date" class="inp" id="f-actual"/></div>
        <div class="form-group"><label>Horas est.</label><input type="number" class="inp" id="f-hours" placeholder="0"/></div>
      </div>
      <div style="display:flex;gap:16px;align-items:center">
        <div class="form-group" style="flex:1"><label>Status</label><select class="inp" id="f-status"></select></div>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#f97316;font-size:13px;font-weight:700;margin-top:18px">
          <input type="checkbox" id="f-urgent" style="accent-color:#f97316;width:16px;height:16px"/> Urgente
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('task-modal')">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- UNLOCK MODAL -->
<div class="overlay hidden" id="unlock-modal" onclick="closeModalOnBg(event,'unlock-modal')">
  <div class="unlock-modal">
    <div class="icon">Socios</div>
    <h3>Area de socios</h3>
    <p>Solo para Dio y Santi</p>
    <input type="password" class="inp" id="pass-input" placeholder="Contrasena" style="text-align:center;margin-bottom:12px" onkeydown="if(event.key==='Enter')tryPass()"/>
    <p class="err-msg hidden" id="pass-err">Contrasena incorrecta</p>
    <button class="btn-save" style="width:100%" onclick="tryPass()">Entrar</button>
  </div>
</div>

<!-- PARTNER TASK MODAL -->
<div class="overlay hidden" id="pt-modal" onclick="closeModalOnBg(event,'pt-modal')">
  <div class="modal" style="max-width:480px;border-color:#f9731633">
    <h2 id="pt-modal-title" style="color:#f97316;font-size:16px">Nueva tarea de socios</h2>
    <div class="form-grid">
      <div class="form-group"><label>Titulo</label><input class="inp" id="pt-title" placeholder="Ej: Revisar presupuesto Q3"/></div>
      <div class="form-row form-row-2">
        <div class="form-group"><label>Categoria</label><select class="inp" id="pt-cat"></select></div>
        <div class="form-group"><label>Responsable</label><select class="inp" id="pt-owner"><option>Dio</option><option>Santi</option><option>Ambos</option></select></div>
      </div>
      <div class="form-row form-row-2">
        <div class="form-group"><label>Status</label><select class="inp" id="pt-status"></select></div>
        <div class="form-group"><label>Fecha limite</label><input type="date" class="inp" id="pt-due"/></div>
      </div>
      <div class="form-group"><label>Notas</label><textarea class="inp" id="pt-notes" placeholder="Contexto, decisiones..." style="height:70px"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('pt-modal')">Cancelar</button>
      <button class="btn-save" style="background:#f97316" onclick="savePTask()">Guardar</button>
    </div>
  </div>
</div>

<script>
// SUPABASE CONFIG
const SUPA_URL = "https://bndrrztjfshnowpwrzao.supabase.co";
const SUPA_KEY = "sb_publishable_dKiUj5u_YQMGRajZrFrMXA_1JV7s6bi";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function normalizeStatus(s){return String(s||"Por hacer").replace("En revisiÃ³n","En revision").replace("En revisión","En revision");}
function dbToTask(r){return{id:r.id,brand:r.brand||"",theme:r.theme||"",comments:r.comments||"",status:normalizeStatus(r.status),owners:r.owners||[],startDate:r.start_date||"",dueDate:r.due_date||"",actualDate:r.actual_date||"",estimatedHours:r.estimated_hours||"",urgent:!!r.urgent,completedDate:r.completed_date||null,archived:!!r.archived};}
function taskToDb(t){return{id:t.id,brand:t.brand,theme:t.theme,comments:t.comments,status:t.status,owners:t.owners,start_date:t.startDate,due_date:t.dueDate,actual_date:t.actualDate,estimated_hours:t.estimatedHours,urgent:t.urgent,completed_date:t.completedDate,archived:t.archived};}
function dbToPTask(r){return{id:r.id,title:r.title||"",category:r.category||"",owner:r.owner||"Dio",status:r.status||"Pendiente",dueDate:r.due_date||"",notes:r.notes||""};}
function ptaskToDb(t){return{id:t.id,title:t.title,category:t.category,owner:t.owner,status:t.status,due_date:t.dueDate,notes:t.notes};}

async function dbLoadAll(){
  var r1=await sb.from("tasks").select("*").order("created_at",{ascending:true});
  var r2=await sb.from("partner_tasks").select("*").order("created_at",{ascending:true});
  var r3=await sb.from("team_members").select("*");
  if(r1.data&&r1.data.length>0){tasks=r1.data.map(dbToTask);}
  if(r2.data&&r2.data.length>0){partnerTasks=r2.data.map(dbToPTask);}
  if(r3.data&&r3.data.length>0){teamData=r3.data;TEAMS=getTeams();}
  render();
}
async function dbSaveTask(t){await sb.from("tasks").upsert(taskToDb(t));}
async function dbDeleteTask(id){await sb.from("tasks").delete().eq("id",id);}
async function dbSavePTask(t){await sb.from("partner_tasks").upsert(ptaskToDb(t));}
async function dbDeletePTask(id){await sb.from("partner_tasks").delete().eq("id",id);}
async function dbSaveTeam(){await sb.from("team_members").upsert(teamData);}
async function dbDeleteMember(name){await sb.from("team_members").delete().eq("name",name);}

const DEFAULT_TEAMS = ["Dio","Santi","Luisina","Luli","Ori"];
const DEFAULT_OWNER_COLORS = {Dio:"#3b82f6",Santi:"#f97316",Luisina:"#ec4899",Luli:"#a855f7",Ori:"#14b8a6"};
const COLOR_POOL = ["#3b82f6","#f97316","#ec4899","#a855f7","#14b8a6","#f59e0b","#10b981","#ef4444","#8b5cf6","#06b6d4"];

let teamData = JSON.parse(localStorage.getItem("anm_team")||"null") || DEFAULT_TEAMS.map((n,i)=>({name:n,color:DEFAULT_OWNER_COLORS[n]||COLOR_POOL[i%COLOR_POOL.length],role:""}));

function getTeams() { return teamData.map(t=>t.name); }
function getOwnerColor(name) { const t=teamData.find(x=>x.name===name); return t?t.color:"#475569"; }
function saveTeam() { localStorage.setItem("anm_team",JSON.stringify(teamData)); }

let TEAMS = getTeams();
let OWNER_COLORS = {};
const STATUSES = ["Por hacer","En progreso","En revision","Aprobado","Completado"];
const BRANDS = ["Mi Pileta","Antequera Muebles","Avanti Club","Coarmi","Froz","Urucap","Academia Buenos Aires","ANM","Otro"];

const PARTNER_CATS = ["Finanzas","Estrategia","Clientes","Equipo","Operaciones","Otro"];
const PARTNER_STATUSES = ["Pendiente","En curso","Hecho"];

const STATUS_STYLES = {
  "Por hacer":   {bg:"#1e293b",text:"#94a3b8",dot:"#475569"},
  "En progreso": {bg:"#1e3a5f",text:"#60a5fa",dot:"#3b82f6"},
  "En revision": {bg:"#312e1a",text:"#fbbf24",dot:"#f59e0b"},
  "Aprobado":    {bg:"#1a3322",text:"#4ade80",dot:"#22c55e"},
  "Completado":  {bg:"#1e1e2e",text:"#a78bfa",dot:"#8b5cf6"},
};
const PARTNER_STATUS_STYLES = {
  "Pendiente":{bg:"#1e293b",text:"#94a3b8",dot:"#475569"},
  "En curso": {bg:"#1e3a5f",text:"#60a5fa",dot:"#3b82f6"},
  "Hecho":    {bg:"#1a3322",text:"#4ade80",dot:"#22c55e"},
};
// OWNER_COLORS is now dynamic via getOwnerColor()
const CAT_COLORS = {Finanzas:"#f97316",Estrategia:"#a855f7",Clientes:"#3b82f6",Equipo:"#ec4899",Operaciones:"#14b8a6",Otro:"#475569"};

const SAMPLE_TASKS = [
  {id:1,brand:"Mi Pileta",theme:"Calendario de contenido Mayo",comments:"Creacion e ideacion de ideas",status:"En progreso",owners:["Luisina"],startDate:"2026-05-01",dueDate:"2026-06-10",actualDate:"",estimatedHours:3,completedDate:null,archived:false,urgent:true},
  {id:2,brand:"Mi Pileta",theme:"Media Kit",comments:"Diseno final pendiente aprobacion cliente",status:"En revision",owners:["Luli"],startDate:"2026-05-15",dueDate:"2026-06-12",actualDate:"",estimatedHours:5,completedDate:null,archived:false,urgent:true},
  {id:3,brand:"Antequera Muebles",theme:"Calendario de contenido Mayo",comments:"Diseno (Falta aprobacion de cliente)",status:"Aprobado",owners:["Luli","Luisina"],startDate:"2026-05-01",dueDate:"2026-06-15",actualDate:"",estimatedHours:4,completedDate:null,archived:false,urgent:false},
  {id:4,brand:"Froz",theme:"Brochure vending machine",comments:"Revision final copy",status:"Por hacer",owners:["Dio"],startDate:"2026-06-01",dueDate:"2026-06-20",actualDate:"",estimatedHours:6,completedDate:null,archived:false,urgent:false},
  {id:5,brand:"Avanti Club",theme:"Campana Hot Sale 2026",comments:"Email marketing + Meta Ads",status:"Completado",owners:["Dio","Santi"],startDate:"2026-05-10",dueDate:"2026-06-01",actualDate:"2026-06-01",estimatedHours:8,completedDate:"2026-06-01",archived:true,urgent:false},

async function saveTask() {
  const brand=document.getElementById("f-brand").value;
  const theme=document.getElementById("f-theme").value.trim();
  if(!theme)return;
  const form={brand,theme,comments:document.getElementById("f-comments").value,status:document.getElementById("f-status").value,owners:[...selectedOwners],startDate:document.getElementById("f-start").value,dueDate:document.getElementById("f-due").value,actualDate:document.getElementById("f-actual").value,estimatedHours:document.getElementById("f-hours").value,urgent:document.getElementById("f-urgent").checked};
  var task;
  if(editingTaskId){
    tasks=tasks.map(t=>t.id===editingTaskId?{...t,...form}:t);
    task=tasks.find(t=>t.id===editingTaskId);
  } else {
    task={...form,id:uid(),completedDate:null,archived:false};
    tasks.push(task);
  }
  save();
  try{await dbSaveTask(task);}catch(e){console.warn("Supabase save failed",e);}
  closeModal("task-modal"); render();
}
async function changeStatus(id,status) {
  status=normalizeStatus(status);
  tasks=tasks.map(t=>{
    if(t.id!==id)return t;
    return {...t,status,completedDate:status==="Completado"?today():t.completedDate,actualDate:status==="Completado"&&!t.actualDate?today():t.actualDate};
  });
  save();
  var task=tasks.find(t=>t.id===id);
  try{if(task)await dbSaveTask(task);}catch(e){console.warn("Supabase update failed",e);}
  render();
}
async function archiveTask(id){tasks=tasks.map(t=>t.id===id?{...t,archived:true}:t);save();var task=tasks.find(t=>t.id===id);try{if(task)await dbSaveTask(task);}catch(e){console.warn(e);}render();}
async function deleteTask(id){if(confirm("Eliminar esta tarea?")){tasks=tasks.filter(t=>t.id!==id);save();try{await dbDeleteTask(id);}catch(e){console.warn(e);}render();}}

function avatar(name,size=28){return `<span class="avatar" style="width:${size}px;height:${size}px;min-width:${size}px;min-height:${size}px;max-width:${size}px;max-height:${size}px;background:${getOwnerColor(name)||"#475569"};font-size:${Math.max(10,size*0.4)}px;line-height:1" title="${name}">${name[0]}</span>`;}

function statusBadge(status,taskId){
  status=normalizeStatus(status);
  const s=STATUS_STYLES[status]||STATUS_STYLES["Por hacer"];
  const menuId=`menu-${taskId}`;
  const opts=STATUSES.map(st=>{const ss=STATUS_STYLES[st];return `<div class="badge-opt" style="color:${ss.text};background:${st===status?ss.bg:"transparent"}" onmouseenter="this.style.background='${ss.bg}'" onmouseleave="this.style.background='${st===status?ss.bg:"transparent"}'" onclick="changeStatus(${taskId},'${st}');closeBadgeMenus()"><span class="dot" style="background:${ss.dot}"></span>${st}</div>`;}).join("");
  return `<div class="badge" style="background:${s.bg};color:${s.text};border-color:${s.dot}44" onclick="toggleMenu('${menuId}')"><span class="dot" style="background:${s.dot}"></span>${status}<span class="arrow">v</span><div class="badge-menu" id="${menuId}">${opts}</div></div>`;
}

function pStatusBadge(status,ptId){
  const s=PARTNER_STATUS_STYLES[status]||PARTNER_STATUS_STYLES["Pendiente"];
  const menuId=`pmenu-${ptId}`;
  const opts=PARTNER_STATUSES.map(st=>{const ss=PARTNER_STATUS_STYLES[st];return `<div class="badge-opt" style="color:${ss.text};background:${st===status?ss.bg:"transparent"}" onmouseenter="this.style.background='${ss.bg}'" onmouseleave="this.style.background='${st===status?ss.bg:"transparent"}'" onclick="changePStatus('${ptId}','${st}');closeBadgeMenus()"><span class="dot" style="background:${ss.dot}"></span>${st}</div>`;}).join("");
  return `<div class="badge" style="background:${s.bg};color:${s.text};border-color:${s.dot}44" onclick="toggleMenu('${menuId}')"><span class="dot" style="background:${s.dot}"></span>${status}<span class="arrow">v</span><div class="badge-menu" id="${menuId}">${opts}</div></div>`;
}

function toggleMenu(id){
  closeBadgeMenus();
  var m=document.getElementById(id);
  if(!m) return;
  var badge=m.parentElement;
  var rect=badge.getBoundingClientRect();
  var menuH=180; // estimated menu height
  var spaceBelow=window.innerHeight-rect.bottom;
  m.style.left=rect.left+'px';
  if(spaceBelow<menuH){
    // open upward
    m.style.top='';
    m.style.bottom=(window.innerHeight-rect.top+4)+'px';
  } else {
    m.style.bottom='';
    m.style.top=(rect.bottom+4)+'px';
  }
  m.classList.add("open");
}
function closeBadgeMenus(){document.querySelectorAll(".badge-menu.open").forEach(m=>m.classList.remove("open"));}
document.addEventListener("click",e=>{if(!e.target.closest(".badge"))closeBadgeMenus();});

function duePill(dueDate){
  if(!dueDate)return`<span style="color:#475569;font-size:12px">Sin fecha</span>`;
  const d=daysLeft(dueDate);
  const color=d<0?"#ef4444":d<=2?"#f97316":d<=5?"#fbbf24":"#4ade80";
  const label=d<0?`${Math.abs(d)}d atrasada`:d===0?"Hoy":`${d}d`;
  return `<span class="due-pill" style="color:${color}">${label} <span style="color:#475569;font-weight:400">(${fmt(dueDate)})</span></span>`;
}

function getFiltered(){
  let ts=[...tasks];
  if(currentTab==="archive")ts=ts.filter(t=>t.archived); else ts=ts.filter(t=>!t.archived);
  if(filterOwner!=="Todos")ts=ts.filter(t=>t.owners.includes(filterOwner));
  if(filterBrand!=="Todas")ts=ts.filter(t=>t.brand===filterBrand);
  if(currentTab==="tasks"&&filterStatus!=="Todas"){if(filterStatus==="Activas")ts=ts.filter(t=>t.status!=="Completado");else ts=ts.filter(t=>t.status===filterStatus);}
  ts.sort((a,b)=>{if(sortBy==="dueDate")return(a.dueDate||"9999")>(b.dueDate||"9999")?1:-1;if(sortBy==="brand")return a.brand.localeCompare(b.brand);if(sortBy==="status")return STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status);return 0;});
  return ts;
}

function renderDashboard(){
  var active=tasks.filter(function(t){return !t.archived;});
  var overdue=active.filter(function(t){return t.dueDate&&daysLeft(t.dueDate)<0&&t.status!=="Completado";});
  var dueSoon=active.filter(function(t){return t.dueDate&&daysLeft(t.dueDate)>=0&&daysLeft(t.dueDate)<=3&&t.status!=="Completado";});
  var urgentOnly=active.filter(function(t){return t.urgent&&overdue.indexOf(t)===-1&&dueSoon.indexOf(t)===-1;});
  var stats=STATUSES.map(function(s){
    var ss=STATUS_STYLES[s];
    var count=active.filter(function(t){return t.status===s;}).length;
    return '<div class="stat-card" style="border:1px solid '+ss.dot+'44"><div class="stat-num" style="color:'+ss.text+'">'+count+'</div><div class="stat-label">'+s+'</div></div>';
  }).join("");
  var alerts="";
  if(overdue.length||dueSoon.length||urgentOnly.length){
    var rows=[];
    function alertRow(t,type,label,color){
      return '<div class="alert-row" style="border-color:'+color+'33"><span class="alert-label" style="color:'+color+'">'+label+'</span><div class="alert-main"><span class="alert-task">'+t.theme+'</span><span class="alert-brand">'+t.brand+'</span></div><span class="alert-date">'+(t.dueDate?fmt(t.dueDate):'')+'</span><div class="alert-owners">'+t.owners.map(function(o){return avatar(o,22);}).join("")+'</div></div>';
    }
    overdue.forEach(function(t){
      rows.push(alertRow(t,"overdue",Math.abs(daysLeft(t.dueDate))+"d atrasada","#ef4444"));
    });
    dueSoon.forEach(function(t){
      var lbl=daysLeft(t.dueDate)===0?"Vence hoy":"Vence en "+daysLeft(t.dueDate)+"d";
      rows.push(alertRow(t,"soon",lbl,"#f97316"));
    });
    urgentOnly.forEach(function(t){
      rows.push(alertRow(t,"urgent","Urgente","#fbbf24"));
    });
    alerts='<div class="alert-box"><h3 class="alert-title">&#128680; Alertas de tareas</h3>'+rows.join("")+'</div>';
  }
  return '<div class="stats-grid">'+stats+'</div>'+alerts;
}

  const catOpts=["Todas",...PARTNER_CATS].map(function(c){return '<option value="'+c+'"'+(fc===c?' selected':'')+'>'+c+'</option>';}).join("");
  const stOpts=[{v:"Activas",l:"Activas"},{v:"Todas",l:"Todas"},...PARTNER_STATUSES.map(function(s){return{v:s,l:s};})].map(function(o){return '<option value="'+o.v+'"'+(fs===o.v?' selected':'')+'>'+o.l+'</option>';}).join("");

  const ptRows=filteredP.length===0?'<div style="padding:40px;text-align:center;color:#334155;font-size:14px">No hay tareas de socios</div>':
    filteredP.map(function(pt,i){
      const ss=PARTNER_STATUS_STYLES[pt.status]||PARTNER_STATUS_STYLES["Pendiente"];
      const catColor=CAT_COLORS[pt.category]||"#475569";
      const dl=pt.dueDate?daysLeft(pt.dueDate):null;
      const dateColor=dl===null?"#475569":dl<0?"#ef4444":dl<=3?"#f97316":"#475569";
      const notesHtml=pt.notes?'<div style="color:#475569;font-size:12px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px">'+pt.notes+'</div>':"";
      const dateHtml=pt.dueDate?'<span style="font-size:12px;color:'+dateColor+';flex-shrink:0;font-weight:'+(dl<=3?700:400)+'">'+fmt(pt.dueDate)+'</span>':"";
      const doneClass=pt.status==="Hecho"?" done":"";
      return '<div class="pt-row">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:'+catColor+';flex-shrink:0"></div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="display:flex;align-items:center;gap:8px">'
            +'<span class="pt-title'+doneClass+'">'+pt.title+'</span>'
            +'<span class="pt-cat" style="color:'+catColor+';background:'+catColor+'18">'+pt.category+'</span>'
          +'</div>'
          +notesHtml
        +'</div>'
        +'<span style="font-size:12px;color:#64748b;flex-shrink:0">'+pt.owner+'</span>'
        +dateHtml
        +pStatusBadge(pt.status,pt.id)
        +'<div class="pt-actions">'
          +'<button class="action-btn" onclick="openEditPTask(\''+pt.id+'\')">&#9999;&#65039;</button>'
          +'<button class="action-btn" onclick="deletePTask(\''+pt.id+'\')">&#128465;&#65039;</button>'
        +'</div>'
      +'</div>';
    }).join("");

  const memberRows=teamData.map(function(m){
    const safeRole=(m.role||"").replace(/"/g,"&quot;");
    const safeName=m.name.replace(/'/g,"\\'");
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e293b44">'
      +'<span class="avatar" data-member="'+m.name+'" style="width:36px;height:36px;background:'+m.color+';font-size:14px;flex-shrink:0">'+m.name[0]+'</span>'
      +'<div style="flex:1">'
        +'<span style="font-size:14px;font-weight:700;color:#f1f5f9">'+m.name+'</span>'
        +(m.role?'<span style="font-size:11px;color:#94a3b8;margin-left:8px">'+m.role+'</span>':"")
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
        +'<input type="text" value="'+safeRole+'" placeholder="Rol (ej: Disenadora)" style="background:#1e293b;border:1px solid #334155;border-radius:6px;color:#f1f5f9;padding:5px 10px;font-size:12px;width:160px;outline:none" onchange="updateMemberRole(\''+safeName+'\',this.value)"/>'
        +'<input type="color" value="'+m.color+'" style="width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0" onchange="updateMemberColor(\''+safeName+'\',this.value)" title="Color del avatar"/>'
        +'<button class="action-btn" style="color:#ef4444;border-color:#ef444433" onclick="removeTeamMember(\''+safeName+'\')" title="Eliminar">&#128465;&#65039;</button>'
      +'</div>'
    +'</div>';
  }).join("");

  const nextColor=COLOR_POOL[teamData.length%COLOR_POOL.length];

  return '<h2 style="color:#f97316;font-size:18px;font-weight:800;margin:0 0 24px">&#128274; Panel de socios</h2>'
    +'<div class="partners-stats">'+statsH+'</div>'
    +'<div class="two-col">'
      +'<div class="panel"><h3>Carga por persona</h3>'+personRows+'</div>'
      +'<div class="panel"><h3>Tareas por marca</h3>'+brandRows+'</div>'
    +'</div>'
    +'<div class="partner-tasks-box">'
      +'<div class="partner-tasks-header">'
        +'<div><h3 style="margin:0;color:#f97316;font-weight:800;font-size:15px">&#129309; Tareas de socios</h3><p style="margin:2px 0 0;color:#475569;font-size:12px">Privado &middot; Solo Dio y Santi</p></div>'
        +'<div style="display:flex;gap:8px;align-items:center">'
          +'<select class="inp" id="pt-filter-cat" style="width:auto;font-size:12px;padding:5px 10px" onchange="render()">'+catOpts+'</select>'
          +'<select class="inp" id="pt-filter-st" style="width:auto;font-size:12px;padding:5px 10px" onchange="render()">'+stOpts+'</select>'
          +'<button class="btn-save" style="background:#f97316;padding:6px 16px;font-size:12px" onclick="openNewPTask()">+ Nueva</button>'
        +'</div>'
      +'</div>'
      +'<div>'+ptRows+'</div>'
    +'</div>'
    +'<div style="margin-top:28px;background:#0a0c14;border:1px solid #3b82f622;border-radius:16px;overflow:hidden">'
      +'<div style="padding:18px 24px;border-bottom:1px solid #3b82f622;background:#0f1218">'
        +'<h3 style="margin:0;color:#3b82f6;font-weight:800;font-size:15px">&#128101; Gestion del equipo</h3>'
        +'<p style="margin:2px 0 0;color:#475569;font-size:12px">Agrega o remove miembros del equipo</p>'
      +'</div>'
      +'<div style="padding:20px 24px">'
        +memberRows
        +'<div style="display:flex;gap:8px;align-items:center;margin-top:16px;flex-wrap:wrap">'
          +'<input type="text" id="new-member-name" placeholder="Nombre" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 12px;font-size:13px;width:130px;outline:none"/>'
          +'<input type="text" id="new-member-role" placeholder="Rol (opcional)" style="background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:7px 12px;font-size:13px;width:160px;outline:none"/>'
          +'<input type="color" id="new-member-color" value="'+nextColor+'" style="width:36px;height:36px;border:none;border-radius:8px;cursor:pointer;padding:0" title="Color"/>'
          +'<button class="btn-save" style="background:#3b82f6;padding:7px 18px;font-size:13px" onclick="addTeamMember()">+ Agregar</button>'
        +'</div>'
      +'</div>'
    +'</div>';
}

function refreshTeams() { TEAMS = getTeams(); }

async function addTeamMember() {
  const nameEl = document.getElementById("new-member-name");
  const colorEl = document.getElementById("new-member-color");
  const roleEl = document.getElementById("new-member-role");
  const name = nameEl.value.trim();
  if (!name) return;
  if (teamData.find(t => t.name.toLowerCase() === name.toLowerCase())) {
    alert("Ya existe un miembro con ese nombre."); return;
  }
  var newMember={name, color:colorEl.value, role:roleEl.value.trim()};
  teamData.push(newMember);
  try{await dbSaveTeam();}catch(e){console.warn(e);}
  refreshTeams(); nameEl.value=""; roleEl.value=""; render();
}

async function removeTeamMember(name) {
  if (!confirm(`Eliminar a ${name} del equipo?`)) return;
  teamData = teamData.filter(t => t.name !== name);
  try{await dbDeleteMember(name);}catch(e){console.warn(e);}
  refreshTeams(); render();
}

async function updateMemberColor(name, color) {
  teamData = teamData.map(t => t.name === name ? {...t, color} : t);
  try{await dbSaveTeam();}catch(e){console.warn(e);}
  document.querySelectorAll(`[data-member="${name}"]`).forEach(el => el.style.background = color);
}

async function updateMemberRole(name, role) {
  teamData = teamData.map(t => t.name === name ? {...t, role} : t);
  try{await dbSaveTeam();}catch(e){console.warn(e);}
}

function render() {
  const c=document.getElementById("content");
  if(currentTab==="partners"&&isPartner){ c.innerHTML=renderPartners(); return; }
  let html="";
  if(currentTab==="tasks") html+=renderDashboard();
  html+=renderFilters();
  html+=renderTable();
  c.innerHTML=html;
}

// Init selects
(function(){
  const fb=document.getElementById("f-brand"); BRANDS.forEach(b=>{const o=document.createElement("option");o.value=b;o.textContent=b;fb.appendChild(o);});
  const fs=document.getElementById("f-status"); STATUSES.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;fs.appendChild(o);});
  const pc=document.getElementById("pt-cat"); PARTNER_CATS.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;pc.appendChild(o);});
  const ps=document.getElementById("pt-status"); PARTNER_STATUSES.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;ps.appendChild(o);});
})();

// Load from Supabase on start
dbLoadAll().catch(function(){render();});
</script>
