<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANM - Gestion de trabajo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030712;color:#f1f5f9;font-family:Segoe UI,system-ui,sans-serif;min-height:100vh}
button,input,select,textarea{font-family:inherit}button{cursor:pointer}
.header{position:sticky;top:0;z-index:20;background:#0a0f1e;border-bottom:1px solid #1e293b;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:36px;height:36px;border-radius:10px;background:#3b82f6;display:grid;place-items:center;font-weight:900}.brand-title{font-size:15px;font-weight:900}.brand-sub{font-size:12px;color:#64748b}
.nav{display:flex;gap:6px;flex-wrap:wrap}.tab-btn,.primary-btn{border:0;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:800}.tab-btn{background:transparent;color:#64748b}.tab-btn.active{background:#1e293b;color:#f8fafc}.primary-btn{background:#3b82f6;color:white}
.content{padding:16px 16px 80px;max-width:1280px;margin:auto}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}.stat-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:12px}.stat-num{font-size:22px;font-weight:900}.stat-label{font-size:10px;color:#64748b;text-transform:uppercase;font-weight:800;letter-spacing:.6px;margin-top:2px}
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:10px;margin-bottom:14px}.filter{display:flex;align-items:center;gap:6px}.filter label{color:#64748b;font-size:11px;font-weight:800;text-transform:uppercase}.inp{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f8fafc;padding:8px 10px;font-size:13px;outline:none;width:100%}.inp:focus{border-color:#3b82f6}.count{margin-left:auto;color:#64748b;font-size:12px}
.table-wrap{background:#0a0f1e;border:1px solid #1e293b;border-radius:14px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:920px}th{background:#0f172a;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.7px;text-align:left;padding:10px 12px;border-bottom:1px solid #1e293b}td{padding:10px 12px;border-bottom:1px solid #1e293b;vertical-align:middle;font-size:13px}tr:hover td{background:#1e293b22}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;border:1px solid transparent;white-space:nowrap}.status-select{appearance:none}.avatar{display:inline-grid;place-items:center;aspect-ratio:1/1;min-width:var(--avatar-size,28px);width:var(--avatar-size,28px);height:var(--avatar-size,28px);min-height:var(--avatar-size,28px);max-width:var(--avatar-size,28px);max-height:var(--avatar-size,28px);border-radius:50%;color:white;font-weight:900;font-size:12px;line-height:1;border:2px solid #0f172a;margin-right:-6px;flex:0 0 var(--avatar-size,28px);overflow:hidden}.actions{display:flex;gap:5px;justify-content:flex-end}.icon-btn{background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:7px;padding:6px 9px;font-size:12px;font-weight:800}
.cards{display:none;flex-direction:column;gap:12px}.task-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:14px;min-width:0}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.card-title{font-size:15px;font-weight:900;line-height:1.3;overflow-wrap:anywhere}.card-brand{display:block;color:#94a3b8;font-size:12px;margin-top:4px;overflow-wrap:anywhere}.card-owners{display:flex;flex-shrink:0;padding-left:6px}.card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.field{background:#0a0f1e;border:1px solid #1e293b;border-radius:10px;padding:9px 10px;min-width:0}.field.wide{grid-column:1/-1}.field-label{display:block;color:#64748b;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.field-value{display:flex;align-items:flex-start;gap:7px;flex-wrap:wrap;color:#cbd5e1;font-size:12px;line-height:1.4;overflow-wrap:anywhere}.card-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #1e293b}.empty{padding:40px;text-align:center;color:#64748b;background:#0a0f1e;border:1px solid #1e293b;border-radius:12px}
.overlay{position:fixed;inset:0;background:#000b;z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow:auto}.hidden{display:none}.modal{background:#0f172a;border:1px solid #1e293b;border-radius:14px;width:min(620px,100%);padding:20px;margin:auto}.modal h2{font-size:18px;margin-bottom:16px}.form{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.group{display:flex;flex-direction:column;gap:5px}.group label{font-size:11px;font-weight:900;color:#64748b;text-transform:uppercase}textarea.inp{min-height:80px;resize:vertical}.owner-list{display:flex;gap:8px;flex-wrap:wrap}.owner-chip{border:1px solid #334155;background:#1e293b;color:#cbd5e1;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.owner-chip.active{background:#3b82f6;color:white;border-color:#3b82f6}.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}.cancel{background:#1e293b;color:#94a3b8}.save{background:#3b82f6;color:white}.cancel,.save{border:0;border-radius:8px;padding:9px 16px;font-weight:900}
@media(max-width:640px){.header{padding:10px}.brand{width:100%}.nav{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.primary-btn{grid-column:1/-1}.tab-btn,.primary-btn{min-height:38px;width:100%;padding:8px 6px}.content{padding:12px 10px 80px}.stats-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.filters{display:grid;grid-template-columns:1fr;gap:8px}.filter{display:grid;grid-template-columns:82px minmax(0,1fr);gap:8px}.count{margin-left:0;justify-self:end}.table-wrap{display:none}.cards{display:flex}.task-card{padding:12px}.card-grid{grid-template-columns:1fr}.field{padding:10px}.badge{white-space:normal;line-height:1.25}.row{grid-template-columns:1fr}.modal{padding:16px;margin:0}.modal-footer{display:grid;grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header class="header"><div class="brand"><div class="logo">ANM</div><div><div class="brand-title">Gestion de trabajo</div><div class="brand-sub">Tareas, responsables y vencimientos</div></div></div><div class="nav"><button class="tab-btn active" id="tab-active" onclick="setTab('active')">Tareas</button><button class="tab-btn" id="tab-archive" onclick="setTab('archive')">Archivo</button><button class="tab-btn" onclick="seedData()">Demo</button><button class="primary-btn" onclick="openTask()">Nueva tarea</button></div></header>
<main class="content" id="app"></main>
<div class="overlay hidden" id="modal" onclick="closeOnBg(event)"><div class="modal"><h2 id="modal-title">Nueva tarea</h2><div class="form"><div class="group"><label>Tema</label><input class="inp" id="f-theme" /></div><div class="row"><div class="group"><label>Marca</label><input class="inp" id="f-brand" /></div><div class="group"><label>Status</label><select class="inp" id="f-status"></select></div></div><div class="row"><div class="group"><label>Fecha estimada</label><input class="inp" type="date" id="f-due" /></div><div class="group"><label>Fecha real</label><input class="inp" type="date" id="f-real" /></div></div><div class="row"><div class="group"><label>Horas estimadas</label><input class="inp" type="number" min="0" step="0.5" id="f-hours" /></div><div class="group"><label>Urgente</label><select class="inp" id="f-urgent"><option value="false">No</option><option value="true">Si</option></select></div></div><div class="group"><label>Responsables</label><div class="owner-list" id="owner-list"></div></div><div class="group"><label>Comentarios</label><textarea class="inp" id="f-comments"></textarea></div></div><div class="modal-footer"><button class="cancel" onclick="closeTask()">Cancelar</button><button class="save" onclick="saveTask()">Guardar</button></div></div></div>
<script>
const STATUSES=["Por hacer","En progreso","En revision","Aprobado","Completado"];
const STATUS_COLORS={"Por hacer":{bg:"#334155",fg:"#cbd5e1",bd:"#475569"},"En progreso":{bg:"#1d4ed8",fg:"#dbeafe",bd:"#3b82f6"},"En revision":{bg:"#7c2d12",fg:"#fed7aa",bd:"#f97316"},"Aprobado":{bg:"#14532d",fg:"#bbf7d0",bd:"#22c55e"},"Completado":{bg:"#064e3b",fg:"#a7f3d0",bd:"#10b981"}};
const PEOPLE=[{name:"Dio",color:"#3b82f6"},{name:"Santi",color:"#f97316"},{name:"Luisina",color:"#22c55e"},{name:"Luli",color:"#a855f7"},{name:"Ori",color:"#ec4899"}];
let currentTab="active",editingId=null,selectedOwners=[],filters={owner:"Todos",brand:"Todas",status:"Activas",sort:"dueDate"};
let tasks=JSON.parse(localStorage.getItem("anm_tasks")||"null")||[{id:id(),theme:"Calendario de contenido Mayo",brand:"Mi Pileta",comments:"Creacion e ideacion de ideas",owners:["Luisina"],status:"En progreso",dueDate:addDays(2),actualDate:"",estimatedHours:3,urgent:false,archived:false},{id:id(),theme:"Media Kit",brand:"Mi Pileta",comments:"Actualizar presentacion comercial con metricas nuevas y piezas visuales.",owners:["Luisina"],status:"Por hacer",dueDate:addDays(5),actualDate:"",estimatedHours:4,urgent:true,archived:false},{id:id(),theme:"Revision de copies campana",brand:"ANM",comments:"Validar tono, claims y llamados a la accion antes de enviar.",owners:["Dio","Santi"],status:"En revision",dueDate:addDays(1),actualDate:"",estimatedHours:2,urgent:false,archived:false},{id:id(),theme:"Landing de temporada",brand:"Cliente Demo",comments:"Ajustar secciones, responsive y formulario.",owners:["Ori"],status:"Aprobado",dueDate:addDays(8),actualDate:"",estimatedHours:6,urgent:false,archived:false}];
init();
function init(){document.getElementById("f-status").innerHTML=STATUSES.map(s=>`<option>${s}</option>`).join("");renderOwnerButtons();render()}
function id(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}function saveLocal(){localStorage.setItem("anm_tasks",JSON.stringify(tasks))}function fmt(d){if(!d)return "-";const x=new Date(d+"T00:00:00");return x.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"})}function daysLeft(d){const a=new Date();a.setHours(0,0,0,0);const b=new Date(d+"T00:00:00");return Math.round((b-a)/86400000)}function colorFor(name){return(PEOPLE.find(p=>p.name===name)||PEOPLE[0]).color}function avatar(name){return `<span class="avatar" style="--avatar-size:28px;background:${colorFor(name)}">${name[0]}</span>`}function statusBadge(status){const s=STATUS_COLORS[status]||STATUS_COLORS["Por hacer"];return `<span class="badge" style="background:${s.bg};color:${s.fg};border-color:${s.bd}">${status}</span>`}function dueText(d){if(!d)return `<span style="color:#64748b">Sin fecha</span>`;const left=daysLeft(d),color=left<0?"#ef4444":left<=2?"#f97316":left<=5?"#fbbf24":"#4ade80",text=left<0?`${Math.abs(left)}d atrasada`:left===0?"Hoy":`${left}d`;return `<span style="color:${color};font-weight:900">${text}</span><span style="color:#64748b">(${fmt(d)})</span>`}
function setTab(tab){currentTab=tab;document.getElementById("tab-active").classList.toggle("active",tab==="active");document.getElementById("tab-archive").classList.toggle("active",tab==="archive");render()}
function getFiltered(){let out=tasks.filter(t=>currentTab==="archive"?t.archived:!t.archived);if(filters.owner!=="Todos")out=out.filter(t=>t.owners.includes(filters.owner));if(filters.brand!=="Todas")out=out.filter(t=>t.brand===filters.brand);if(currentTab==="active"&&filters.status!=="Todas")out=out.filter(t=>filters.status==="Activas"?t.status!=="Completado":t.status===filters.status);out.sort((a,b)=>filters.sort==="brand"?a.brand.localeCompare(b.brand):filters.sort==="status"?STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status):(a.dueDate||"9999").localeCompare(b.dueDate||"9999"));return out}
function render(){const app=document.getElementById("app"),active=tasks.filter(t=>!t.archived),filtered=getFiltered(),brands=["Todas",...new Set(tasks.map(t=>t.brand).filter(Boolean))],people=["Todos",...PEOPLE.map(p=>p.name)];const stats=STATUSES.map(s=>{const c=STATUS_COLORS[s],n=active.filter(t=>t.status===s).length;return `<div class="stat-card" style="border-color:${c.bd}55"><div class="stat-num" style="color:${c.fg}">${n}</div><div class="stat-label">${s}</div></div>`}).join("");app.innerHTML=`${currentTab==="active"?`<div class="stats-grid">${stats}</div>`:""}<div class="filters"><div class="filter"><label>Persona</label><select class="inp" onchange="filters.owner=this.value;render()">${people.map(x=>`<option ${filters.owner===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="filter"><label>Marca</label><select class="inp" onchange="filters.brand=this.value;render()">${brands.map(x=>`<option ${filters.brand===x?"selected":""}>${x}</option>`).join("")}</select></div>${currentTab==="active"?`<div class="filter"><label>Status</label><select class="inp" onchange="filters.status=this.value;render()">${["Activas","Todas",...STATUSES].map(x=>`<option ${filters.status===x?"selected":""}>${x}</option>`).join("")}</select></div>`:""}<div class="filter"><label>Orden</label><select class="inp" onchange="filters.sort=this.value;render()"><option value="dueDate" ${filters.sort==="dueDate"?"selected":""}>Fecha</option><option value="brand" ${filters.sort==="brand"?"selected":""}>Marca</option><option value="status" ${filters.sort==="status"?"selected":""}>Status</option></select></div><span class="count">${filtered.length} tarea${filtered.length!==1?"s":""}</span></div>${filtered.length?renderTable(filtered)+renderCards(filtered):`<div class="empty">No hay tareas para mostrar</div>`}`}
function renderTable(list){return `<div class="table-wrap"><table><thead><tr><th>Tema</th><th>Marca</th><th>Comentarios</th><th>Responsable</th><th>Status</th><th>Estimada</th><th>Real</th><th>Horas</th><th></th></tr></thead><tbody>${list.map(t=>`<tr><td><strong>${t.urgent?"! ":""}${t.theme}</strong></td><td>${t.brand}</td><td style="max-width:260px;color:#94a3b8">${t.comments||"-"}</td><td>${t.owners.map(avatar).join("")}</td><td>${statusControl(t)}</td><td>${dueText(t.dueDate)}</td><td>${t.actualDate?fmt(t.actualDate):"-"}</td><td>${t.estimatedHours?t.estimatedHours+"h":"-"}</td><td><div class="actions">${actionButtons(t)}</div></td></tr>`).join("")}</tbody></table></div>`}
function renderCards(list){return `<div class="cards">${list.map(t=>`<article class="task-card"><div class="card-head"><div><div class="card-title">${t.urgent?"! ":""}${t.theme}</div><span class="card-brand">${t.brand}</span></div><div class="card-owners">${t.owners.map(avatar).join("")}</div></div><div class="card-grid"><div class="field wide"><span class="field-label">Responsable</span><div class="field-value">${t.owners.map(avatar).join("")}<span>${t.owners.join(", ")}</span></div></div><div class="field"><span class="field-label">Status</span><div class="field-value">${statusControl(t)}</div></div><div class="field"><span class="field-label">Fecha estimada</span><div class="field-value">${dueText(t.dueDate)}</div></div><div class="field"><span class="field-label">Fecha real</span><div class="field-value">${t.actualDate?fmt(t.actualDate):"-"}</div></div><div class="field"><span class="field-label">Horas</span><div class="field-value">${t.estimatedHours?t.estimatedHours+"h":"-"}</div></div>${t.comments?`<div class="field wide"><span class="field-label">Comentarios</span><div class="field-value">${t.comments}</div></div>`:""}</div><div class="card-actions">${actionButtons(t)}</div></article>`).join("")}</div>`}
function statusControl(t){return `<select class="inp status-select" style="background:${STATUS_COLORS[t.status].bg};color:${STATUS_COLORS[t.status].fg};border-color:${STATUS_COLORS[t.status].bd};font-weight:900" onchange="changeStatus('${t.id}',this.value)">${STATUSES.map(s=>`<option ${t.status===s?"selected":""}>${s}</option>`).join("")}</select>`}
function actionButtons(t){const archive=t.status==="Completado"&&!t.archived?`<button class="icon-btn" onclick="archiveTask('${t.id}')">Archivar</button>`:"",restore=t.archived?`<button class="icon-btn" onclick="restoreTask('${t.id}')">Restaurar</button>`:"";return `<button class="icon-btn" onclick="openTask('${t.id}')">Editar</button>${archive}${restore}<button class="icon-btn" onclick="deleteTask('${t.id}')">Borrar</button>`}
function renderOwnerButtons(){document.getElementById("owner-list").innerHTML=PEOPLE.map(p=>`<button type="button" class="owner-chip" id="owner-${p.name}" onclick="toggleOwner('${p.name}')">${p.name}</button>`).join("")}function toggleOwner(name){selectedOwners=selectedOwners.includes(name)?selectedOwners.filter(x=>x!==name):[...selectedOwners,name];PEOPLE.forEach(p=>document.getElementById("owner-"+p.name).classList.toggle("active",selectedOwners.includes(p.name)))}
function openTask(idToEdit){editingId=idToEdit||null;const t=tasks.find(x=>x.id===editingId)||{theme:"",brand:"",comments:"",owners:[],status:"Por hacer",dueDate:"",actualDate:"",estimatedHours:"",urgent:false};document.getElementById("modal-title").textContent=editingId?"Editar tarea":"Nueva tarea";document.getElementById("f-theme").value=t.theme;document.getElementById("f-brand").value=t.brand;document.getElementById("f-status").value=t.status;document.getElementById("f-due").value=t.dueDate||"";document.getElementById("f-real").value=t.actualDate||"";document.getElementById("f-hours").value=t.estimatedHours||"";document.getElementById("f-urgent").value=String(!!t.urgent);document.getElementById("f-comments").value=t.comments||"";selectedOwners=[...(t.owners||[])];PEOPLE.forEach(p=>document.getElementById("owner-"+p.name).classList.toggle("active",selectedOwners.includes(p.name)));document.getElementById("modal").classList.remove("hidden")}
function closeTask(){document.getElementById("modal").classList.add("hidden")}function closeOnBg(e){if(e.target.id==="modal")closeTask()}
function saveTask(){const data={theme:document.getElementById("f-theme").value.trim(),brand:document.getElementById("f-brand").value.trim(),status:document.getElementById("f-status").value,dueDate:document.getElementById("f-due").value,actualDate:document.getElementById("f-real").value,estimatedHours:document.getElementById("f-hours").value,urgent:document.getElementById("f-urgent").value==="true",comments:document.getElementById("f-comments").value.trim(),owners:selectedOwners.length?selectedOwners:["Dio"]};if(!data.theme){alert("Agrega un tema.");return}if(editingId)tasks=tasks.map(t=>t.id===editingId?{...t,...data}:t);else tasks.unshift({id:id(),archived:false,...data});saveLocal();closeTask();render()}
function changeStatus(id,value){tasks=tasks.map(t=>t.id===id?{...t,status:value,actualDate:value==="Completado"&&!t.actualDate?new Date().toISOString().slice(0,10):t.actualDate}:t);saveLocal();render()}function archiveTask(id){tasks=tasks.map(t=>t.id===id?{...t,archived:true}:t);saveLocal();render()}function restoreTask(id){tasks=tasks.map(t=>t.id===id?{...t,archived:false}:t);saveLocal();render()}function deleteTask(id){if(confirm("Borrar esta tarea?")){tasks=tasks.filter(t=>t.id!==id);saveLocal();render()}}function seedData(){localStorage.removeItem("anm_tasks");location.reload()}
</script>
</body>
</html>
